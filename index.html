function buildAvatarEmoji(member) {
  const av = member.avatar || {};
  const toneObj = AV_TONES.find(t=>t.label===(av.tone||"Medium")) || AV_TONES[2];
  const baseEmoji = AV_BASE[member.avatarBase||"Woman"]?.emoji || "\u{1F469}";
  const baseWithTone = baseEmoji + toneObj.mod;
  const hairObj = AV_HAIR.find(h=>h.id===(av.hair||"straight"));
  const outfitObj = AV_OUTFITS.find(o=>o.id===(av.outfit||"casual"));
  const accObj = AV_ACCESSORIES.find(a=>a.id===(av.accessory||"none"));
  return {
    full: (accObj?.emoji||"") + (hairObj?.emoji||baseWithTone) + (outfitObj?.emoji||""),
    base: baseWithTone,
    acc:  accObj?.emoji || "",
    hair: hairObj?.emoji || baseWithTone,
    outfit: outfitObj?.emoji || "",
  };
}

async function checkAvatarUnlocks(member, trigger) {
  if (!currentFamily || !familyId) return null;
  const unlocked = member.unlocked || ["starter","none","casual"];
  let newItem = null;
  const grants = {
    "cook5":         Object.values(userDoc?.cookedMeals||{}).filter(Boolean).length >= 5,
    "week_complete": trigger === "week_complete",
    "wellness7":     Object.keys(userDoc?.wellnessLog||{}).filter(k=>userDoc.wellnessLog[k]?.energy!=null).length >= 7,
    "steps_all":     trigger === "steps_all",
    "challenge_win": trigger === "challenge_win",
    "xp_lvl3":       (userDoc?.xp||0) >= 300,
    "xp_lvl5":       (userDoc?.xp||0) >= 500,
    "nutr3":         trigger === "nutr3",
  };
  const allItems = [...AV_HAIR, ...AV_OUTFITS, ...AV_ACCESSORIES];
  for (const item of allItems) {
    if (item.unlock === "starter" || item.unlock === "random") continue;
    if (unlocked.includes(item.id)) continue;
    if (grants[item.unlock]) { newItem = item; unlocked.push(item.id); break; }
  }
  if (trigger === "week_complete" && Math.random() < 0.6) {
    const available = AV_SURPRISE_POOL.filter(id => !unlocked.includes(id));
    if (available.length > 0) {
      const surprise = available[Math.floor(Math.random() * available.length)];
      if (!newItem) newItem = allItems.find(i=>i.id===surprise) || {id:surprise,label:"Surprise Item",emoji:"\u{1F381}"};
      unlocked.push(surprise);
    }
  }
  if (newItem) {
    const members = (currentFamily?.members||[]).map(m => String(m.id)===String(member.id) ? {...m, unlocked} : m);
    await saveFamilyDoc({members});
    return newItem;
  }
  return null;
}

async function aiStyleSuggest(member) {
  if (!member || !currentFamily) return;
  const av = member.avatar || {};
  const log = userDoc?.wellnessLog || {};
  const today = new Date().toDateString();
  const todayEntry = log[today];
  const energyLabels = ["exhausted","low","good","amazing"];
  const stressLabels = ["calm","a bit stressed","very stressed"];
  const energyTxt = todayEntry?.energy != null ? energyLabels[todayEntry.energy] : "unknown";
  const stressTxt = todayEntry?.stress != null ? stressLabels[todayEntry.stress] : "unknown";
  const unlocked = member.unlocked || ["starter","none","casual"];
  const availableOutfits = AV_OUTFITS.filter(o=>unlocked.includes(o.id)||o.unlock==="starter").map(o=>o.id);
  const availableAccs = AV_ACCESSORIES.filter(a=>unlocked.includes(a.id)||a.unlock==="starter").map(a=>a.id);
  showToast("AI Stylist thinking...", "info");
  const prompt = `You are a fun avatar stylist for a family meal planning app. Member: ${member.name}. Today energy: ${energyTxt}, stress: ${stressTxt}. Available outfits: ${availableOutfits.join(",")}. Available accessories: ${availableAccs.join(",")}. Suggest ONE outfit id and ONE accessory id that matches their mood. Respond ONLY with JSON: {"outfit":"id","accessory":"id","reason":"one fun short sentence"}`;
  const raw = await callAI([{role:"user",content:prompt}], "Return only valid JSON. No markdown. No backticks.");
  try {
    const clean = raw.replace(/```json|```/g,"").trim();
    const suggestion = JSON.parse(clean);
    if (suggestion.outfit && suggestion.accessory) {
      const members = (currentFamily?.members||[]).map(m => String(m.id)===String(member.id) ? {...m, avatar:{...av, outfit:suggestion.outfit, accessory:suggestion.accessory}} : m);
      await saveFamilyDoc({members});
      showToast(member.name + ": " + suggestion.reason, "success");
      renderMain();
    }
  } catch(e) { showToast("AI stylist hiccup — try again!", "warn"); }
}

// ── Helpers ────────────────────────────────────────────────
function F() { return currentFamily || {}; }
function allMeals() { return { ...MEALS, ...(F().customMeals||{}) }; }
function uniqueMeals() {
  const a = [];
  DAYS.forEach(d => MT.forEach(t => { if (F().weekPlan?.[d]?.[t]) a.push(F().weekPlan[d][t]); }));
  return [...new Set(a)];
}
function totalCost() { return uniqueMeals().reduce((s,m) => s + (allMeals()[m]?.cost||0), 0); }
function calcStart(mt,prep,cook) {
  const [h,m] = mt.split(":").map(Number);
  let sm = h*60+m-prep-cook; if(sm<0) sm+=1440;
  return `${String(Math.floor(sm/60)).padStart(2,"0")}:${String(sm%60).padStart(2,"0")}`;
}
function getDayNutr(day) {
  const t = {calories:0,protein:0,carbs:0,fat:0,fiber:0,fruits:0,vegetables:0,dairy:0,grains:0};
  MT.map(tp => F().weekPlan?.[day]?.[tp]).filter(Boolean).forEach(m => {
    const d = allMeals()[m]; if(!d) return;
    Object.keys(t).forEach(k => t[k] += (d[k]||0));
  });
  return t;
}
function getNutrAlerts(day) {
  const n=getDayNutr(day), tgt=DIET_T[F().activeDiet||"Standard"], a=[];
  if(n.fruits<tgt.fruits*.5) a.push({group:"🍎 Fruit",msg:`Only ${n.fruits} of ${tgt.fruits} fruit servings.`});
  if(n.vegetables<tgt.vegetables*.5) a.push({group:"🥦 Veggies",msg:`Only ${n.vegetables} of ${tgt.vegetables} veg servings.`});
  if(n.protein<tgt.protein*.5) a.push({group:"💪 Protein",msg:`${n.protein}g of ${tgt.protein}g protein.`});
  return a;
}
function getNutrScore(day) {
  const n=getDayNutr(day), tgt=DIET_T[F().activeDiet||"Standard"];
  const keys=["protein","carbs","fat","fruits","vegetables"];
  return Math.round((keys.filter(k=>n[k]>=(tgt[k]||1)*.7).length/keys.length)*100);
}
function calcWeekScore() {
  const meals=Object.values(F().weekPlan||{}).flatMap(d=>Object.values(d)).filter(Boolean).length;
  const nutr=Math.round(DAYS.reduce((s,d)=>s+getNutrScore(d),0)/7);
  const ck=Object.values(userDoc?.cookedMeals||{}).filter(Boolean).length;
  const well=Object.values(userDoc?.wellnessLog||{}).filter(v=>v?.energy!==null&&v?.energy!==undefined).length;
  return {meals,nutrition:nutr,cooked:ck,wellness:well,total:meals*10+nutr+ck*20+well*15};
}
function genInviteCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
function showToast(msg, type="info") {
  const t = document.createElement("div");
  const colors = {info:"var(--cyan)",success:"var(--green)",error:"var(--pink)",warn:"var(--yellow)"};
  t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid ${colors[type]||colors.info};color:var(--white);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:9999;animation:fadeUp .3s ease;max-width:90vw;text-align:center`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

}

// ── Firebase Operations ────────────────────────────────────
async function saveUserDoc(data) {
  if (!currentUser) return;
  try {
    setSyncStatus("syncing");
    await setDoc(doc(db,"users",currentUser.uid), { ...data, updatedAt:serverTimestamp() }, { merge:true });
    userDoc = { ...userDoc, ...data };
    setSyncStatus("online");
  } catch(e) {
    console.error("Save user error:", e);
    setSyncStatus("error");
    showToast("Sync error — data saved locally", "warn");
    localStorage.setItem("nm_offline_user", JSON.stringify(data));
  }
}

async function saveFamilyDoc(data) {
  if (!familyId) return;
  try {
    setSyncStatus("syncing");
    await setDoc(doc(db,"families",familyId), { ...data, updatedAt:serverTimestamp() }, { merge:true });
    currentFamily = { ...currentFamily, ...data };
    setSyncStatus("online");
  } catch(e) {
    console.error("Save family error:", e);
    setSyncStatus("error");
    showToast("Sync error — data saved locally", "warn");
    localStorage.setItem("nm_offline_family", JSON.stringify(data));
  }
}

function subscribeToFamily(fid) {
  const unsub = onSnapshot(doc(db,"families",fid), (snap) => {
    if (snap.exists()) {
      currentFamily = { id:fid, ...snap.data() };
      setSyncStatus("online");
      renderMain();
      renderHeader();
    }
  }, (e) => {
    console.error("Family snapshot error:", e);
    setSyncStatus("error");
  });
  unsubscribers.push(unsub);
}

function subscribeToUser(uid) {
  const unsub = onSnapshot(doc(db,"users",uid), (snap) => {
    if (snap.exists()) {
      userDoc = snap.data();
      renderHeader();
    }
  });
  unsubscribers.push(unsub);
}

function unsubscribeAll() {
  unsubscribers.forEach(u => u());
  unsubscribers = [];
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    await initUserSession(user);
  } else {
    getRedirectResult(auth).then(result => {
  if (result?.user) {

}).catch(() => renderAuth());
  }
});

async function initUserSession(user) {
  // Load or create user document
  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    // New user — migrate localStorage if it exists
    const localData = migrateFromLocalStorage();
    userDoc = {
      uid: user.uid,
      name: user.displayName || "User",
      email: user.email,
      photo: user.photoURL || "",
      xp: localData?.xp || 0,
      gameBankMins: localData?.gameBankMins || 30,
      wellnessLog: localData?.wellnessLog || {},
      weekHistory: localData?.weekHistory || {},
      cookedMeals: {},
      checkedSteps: {},
      familyIds: [],
      createdAt: serverTimestamp(),
    };
    await setDoc(userRef, userDoc);
  } else {
    userDoc = userSnap.data();
  }

  subscribeToUser(user.uid);

  // Check if user has a family
  if (userDoc.familyIds?.length > 0) {
    familyId = userDoc.familyIds[0];
    subscribeToFamily(familyId);
    const famSnap = await getDoc(doc(db,"families",familyId));
    if (famSnap.exists()) {
      currentFamily = { id:familyId, ...famSnap.data() };
    }
    renderApp();
  } else {
    renderFamilySetup();
  }
}

function migrateFromLocalStorage() {
  try {
    const old = localStorage.getItem("nm_v35") || localStorage.getItem("nm_v3") || localStorage.getItem("neuromeal_v2");
    if (old) {
      const parsed = JSON.parse(old);
      showToast("✅ Migrated your local data to the cloud!", "success");
      localStorage.removeItem("nm_v35");
      return parsed.families?.[0] || parsed;
    }
  } catch(e) {}
  return null;
}

        diet: "Standard",
        goalType: "maintain",
        picky: false,
        avoid: [],
        loves: [],
        moods: [],
        games: [],
        isAdmin: true,
      }],
      weekPlan: defaultWeekPlan,
      prefDays: {Mon:null,Tue:null,Wed:null,Thu:null,Fri:null,Sat:null,Sun:null},
      messages: [],
      videos: [],
      challenges: [],
      activeDiet: "Standard",
      size: 1,

  } catch(e) {
    console.error("Create family error:", e);
    showToast("Error creating family. Please try again.", "error");
  }
}

async function joinFamily(code) {
  try {
    const q = query(collection(db,"families"), where("inviteCode","==",code.toUpperCase()));
    const snap = await getDocs(q);
    if (snap.empty) { showToast("Invalid invite code. Check and try again.", "error"); return; }

    const famDoc = snap.docs[0];
    familyId = famDoc.id;
    const famData = famDoc.data();

    if (famData.memberIds?.includes(currentUser.uid)) {
      showToast("You're already in this family!", "warn");
      currentFamily = { id:familyId, ...famData };
      subscribeToFamily(familyId);
      renderApp();
      return;
    }

    const newMember = {
      id: currentUser.uid,
      name: currentUser.displayName || "Member",
      emoji: "🧑",
      color: "#a78bfa",
      diet: "Standard",
      goalType: "maintain",
      picky: false,
      avoid: [],
      loves: [],
      moods: [],
      games: [],
    };

    await updateDoc(doc(db,"families",familyId), {
      memberIds: arrayUnion(currentUser.uid),
      members: arrayUnion(newMember),
      size: (famData.size||1) + 1,
    });

    await saveUserDoc({ familyIds: arrayUnion(familyId) });
    currentFamily = { id:familyId, ...famData };
    subscribeToFamily(familyId);
    renderApp();
    showToast(`✅ Joined ${famData.name}!`, "success");
  } catch(e) {
    console.error("Join family error:", e);
    showToast("Error joining family. Please try again.", "error");
  }
}

function renderMC(meal) {
  const d=allMeals()[meal]; if(!d) return "";
  const collapsed=(F().collapsedMeals||{})[meal]||false;
  const steps=(userDoc?.checkedSteps||{})[meal]||new Array(d.steps.length).fill(false);
  const done=steps.filter(Boolean).length, prog=Math.round((done/d.steps.length)*100);
  const isCk=(userDoc?.cookedMeals||{})[meal]||false;
  const start=calcStart(d.mealTime,d.prepTime,d.cookTime);
  const tgt=DIET_T[F().activeDiet||"Standard"];
  const pickyIssues=(F().members||[]).filter(m=>m.picky&&(m.avoid||[]).some(a=>meal.toLowerCase().includes(a.toLowerCase()))).map(m=>m.name);
  return `<div class="mc" id="mc-${meal.replace(/\s/g,"_")}">
  <div class="mch">
    <div class="mcem">${d.emoji}</div>
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span class="mct">${meal}</span>
        ${isCk?`<span class="tag tck">✓ COOKED</span>`:""}
        <span class="tag ${d.difficulty==="Easy"?"te":d.difficulty==="Medium"?"tm":"th"}">${d.difficulty}</span>
        ${pickyIssues.length>0?`<span style="font-size:7px;color:var(--yellow)">⚠️ ${pickyIssues.join(", ")}</span>`:""}
      </div>
      <div class="mcm"><span style="color:var(--cyan)">⏱ ${d.prepTime+d.cookTime}min</span><span style="color:var(--gray)">·</span><span style="color:var(--yellow)">💰 $${d.cost.toFixed(2)}</span><span style="color:var(--gray)">·</span><span style="color:var(--gray)">${d.calories}cal</span></div>
    </div>
    <div class="mca">
      <button class="tglb" onclick="toggleCard('${meal}')">${collapsed?"📖":"🛒"}</button>
      <button style="background:transparent;border:none;cursor:pointer;color:var(--gray2);font-size:12px;padding:2px 4px" onclick="removeFromWeek('${meal}')">✕</button>
    </div>
  </div>
  ${!collapsed&&prog>0?`<div style="padding:0 13px 8px"><div class="pbtr" style="height:3px"><div class="pbfl" style="width:${prog}%;background:linear-gradient(90deg,var(--cyan),var(--green))"></div></div><div style="font-size:7px;color:var(--gray);margin-top:2px">${done}/${d.steps.length} steps</div></div>`:""}
  ${collapsed?`<div style="padding:0 13px 13px"><div style="font-size:7px;font-weight:800;color:var(--gray);letter-spacing:1px;margin-bottom:7px">GROCERY LIST</div>${d.ingredients.map(ing=>`<div class="grow"><span style="font-size:11px">• ${ing.item}</span><div style="display:flex;gap:10px"><span style="font-size:9px;color:var(--gray)">${ing.qty}</span><span style="font-size:9px;color:var(--yellow)">$${ing.cost.toFixed(2)}</span></div></div>`).join("")}</div>`:`
  <div>
    <div class="prep">
      <div class="ps"><div class="psl">START</div><div class="psv" style="color:var(--cyan)">${start}</div></div>
      <div class="ps"><div class="psl">PREP</div><div class="psv">${d.prepTime}m</div></div>
      <div class="ps"><div class="psl">COOK</div><div class="psv">${d.cookTime}m</div></div>
      <div class="ps"><div class="psl">EAT AT</div><div class="psv" style="color:var(--pink)">${d.mealTime}</div></div>

// ── Trends ─────────────────────────────────────────────────
function renderTrends() {
  if (!currentFamily || !userDoc) return '<div style="padding:40px;text-align:center;color:var(--gray)">Loading...</div>';
  const hist=currentFamily?.weekHistory||[];
  const ws=calcWeekScore();
  const weeks=["This Week",...hist.map((_,i)=>`Wk ${hist.length-i}`)];
  const costData=[totalCost(),...hist.map(h=>h.cost||0)];
  const nutrData=[ws.nutrition,...hist.map(h=>h.nutrition||0)];
  const mealData=[ws.meals,...hist.map(h=>h.meals||0)];
  const maxCost=Math.max(...costData,1), maxMeals=Math.max(...mealData,1);
  return `<div class="fu">
  <div class="st">📈 Trends</div>
  <button onclick="saveWeekSnapshot()" style="width:100%;padding:10px;background:linear-gradient(135deg,var(--cyan),var(--pink));border:none;border-radius:10px;color:#000;font-weight:800;font-size:11px;font-family:var(--fb);cursor:pointer;margin-bottom:14px">📸 Close Out This Week</button>
  ${["💰 Weekly Cost|costData|var(--yellow)|$","🥦 Nutrition Score|nutrData|var(--green)|%","🍽️ Meals Planned|mealData|var(--cyan)|"].map(s=>{const [title,key,color,pre]=s.split("|");const data=key==="costData"?costData:key==="nutrData"?nutrData:mealData;const mx=key==="costData"?maxCost:key==="mealData"?maxMeals:100;return`<div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:11px"><div style="font-size:11px;font-weight:800;margin-bottom:11px">${title}</div><div style="display:flex;align-items:flex-end;gap:5px;height:70px">${weeks.map((w,i)=>{const pct=Math.round((data[i]/mx)*100);return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1"><div style="font-size:7px;font-weight:800;color:${color}">${pre}${typeof data[i]==="number"?data[i].toFixed(0):0}</div><div style="height:${Math.max(pct,5)}%;width:100%;border-radius:4px 4px 0 0;background:${color}"></div><div style="font-size:7px;color:var(--gray)">${w}</div></div>`;}).join("")}</div></div>`;}).join("")}
  <div style="font-family:var(--fd);font-size:13px;font-weight:800;margin-bottom:10px">📋 History</div>
  ${hist.length===0?`<div style="text-align:center;padding:25px;color:var(--gray);font-size:11px;background:var(--card);border:1px solid var(--border);border-radius:12px">No history yet! Close out your first week above.</div>`:""}
  ${[{label:"This Week",meals:ws.meals,cost:totalCost(),nutr:ws.nutrition,cooked:ws.cooked},...hist.map((h,i)=>({label:`Week ${hist.length-i}`,meals:h.meals||0,cost:h.cost||0,nutr:h.nutrition||0,cooked:h.cooked||0})).reverse()].map(h=>`<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:11px;margin-bottom:7px"><div style="font-size:10px;font-weight:800;color:var(--cyan);min-width:70px">${h.label}</div><div style="flex:1"><div style="font-size:11px">${h.meals} meals · ${h.cooked} cooked</div><div style="font-size:9px;color:var(--gray)">Nutrition: ${h.nutr}%</div></div><div style="font-size:11px;color:var(--yellow);font-weight:700">$${h.cost.toFixed(2)}</div><div style="padding:2px 7px;border-radius:7px;font-size:9px;font-weight:700;background:${h.nutr>=80?"rgba(74,222,128,.1)":h.nutr>=50?"rgba(250,204,21,.1)":"rgba(238,29,82,.1)"};color:${h.nutr>=80?"var(--green)":h.nutr>=50?"var(--yellow)":"var(--pink)"}">${h.nutr>=80?"✅":h.nutr>=50?"⚠️":"🔴"}</div></div>`).join("")}

  `<div id="rooms-list"><div style="color:var(--gray);font-size:11px;text-align:center;padding:10px">Loading rooms...</div></div>`}
  </div>`;
  if(roomIds.length>0) setTimeout(()=>loadRoomsDisplay(),50);
}

async function loadRoomsDisplay() {
  const roomIds = currentFamily?.challengeRoomIds||[];
  if (!roomIds.length) return;
  try {
    const rooms = await Promise.all(roomIds.map(id => getDoc(doc(db,"challengeRooms",id))));
    const el = document.getElementById("rooms-list");
    if (!el) return;
    el.innerHTML = rooms.filter(r=>r.exists()).map(r=>{
      const data = r.data();
      return `<div class="card" style="padding:14px;margin-bottom:9px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div><div style="font-family:var(--fd);font-size:13px;font-weight:800">${data.name}</div><div style="font-size:9px;color:var(--gray);margin-top:2px">${data.familyIds?.length||1} families · Code: ${data.inviteCode}</div></div>
          <button onclick="copyToClipboard('${data.inviteCode}')" class="btn btng" style="font-size:9px">Copy Code</button>
        </div>
        <div style="font-size:10px;color:var(--gray)">Leaderboard coming soon as families join and sync scores!</div>
      </div>`;
    }).join("");
  } catch(e) { console.error("Load rooms error:", e); }
}

// ── Game Break ─────────────────────────────────────────────
function renderGame() {
  if (!userDoc) return '<div style="padding:40px;text-align:center;color:var(--gray)">Loading...</div>';
  const mins=userDoc?.gameBankMins||0;
  const timeStr=UI.timerActive?`${String(Math.floor(UI.timerSecs/60)).padStart(2,"0")}:${String(UI.timerSecs%60).padStart(2,"0")}`:`${mins}m`;
  const r=60,ci=2*Math.PI*r,pct=UI.timerActive?((UI.timerTotal-UI.timerSecs)/UI.timerTotal)*100:0,dash=ci*(pct/100),gap=ci-dash;
  return `<div class="fu">
  <div class="st">🎮 Game Break</div>
  <div style="background:linear-gradient(135deg,rgba(250,204,21,.08),rgba(74,222,128,.06));border:1px solid rgba(250,204,21,.18);border-radius:15px;padding:20px;text-align:center;margin-bottom:13px">
    <div style="font-family:var(--fd);font-size:13px;font-weight:800;margin-bottom:4px">${UI.timerActive?"⏱ Break In Progress!":"Your Game Bank"}</div>
    <div style="position:relative;width:140px;height:140px;margin:10px auto 14px">
      <svg width="140" height="140" viewBox="0 0 140 140" style="transform:rotate(-90deg)"><circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/><circle cx="70" cy="70" r="${r}" fill="none" stroke="${UI.timerActive?"var(--yellow)":"var(--cyan)"}" stroke-width="8" stroke-dasharray="${UI.timerActive?dash:ci} ${UI.timerActive?gap:0}" stroke-linecap="round"/></svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-family:var(--fd);font-size:28px;font-weight:800;color:${UI.timerActive?"var(--yellow)":"var(--cyan)"}">${timeStr}</div><div style="font-size:9px;color:var(--gray);font-weight:700;letter-spacing:.8px;margin-top:2px">${UI.timerActive?"REMAINING":"BANKED"}</div></div>
    </div>
    ${UI.timerActive?`<button onclick="stopTimer()" class="btn btng">⏹ End Break</button>`:`<div style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap">${[5,10,15,20,30].filter(m=>m<=Math.max(mins,5)).map(m=>`<button onclick="startTimer(${m})" class="btn ${m<=mins?"btnp":"btng"}" style="font-size:10px">${m}m</button>`).join("")}</div>${mins===0?`<div style="font-size:10px;color:var(--gray);margin-top:8px">Complete goals to earn game minutes! ⬇️</div>`:""}`}
  </div>
  ${!UI.timerActive?`
  <div style="font-family:var(--fd);font-size:13px;font-weight:800;margin-bottom:10px">🔗 Quick Game Links</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
    ${[{name:"Wordle",url:"https://www.nytimes.com/games/wordle",icon:"🟩"},{name:"NYT Games",url:"https://www.nytimes.com/games",icon:"📰"},{name:"Candy Crush",url:"https://www.candycrushsaga.com",icon:"🍬"},{name:"Solitaire",url:"https://www.solitaire.org",icon:"🃏"},{name:"Sudoku",url:"https://sudoku.com",icon:"🔢"},{name:"Tetris",url:"https://tetris.com/play-tetris",icon:"🧱"}].map(g=>`<a href="${g.url}" target="_blank" style="background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:12px 8px;text-align:center;text-decoration:none;display:block;transition:all .2s" onmouseover="this.style.borderColor='var(--cyan)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'"><div style="font-size:22px;margin-bottom:4px">${g.icon}</div><div style="font-size:9px;font-weight:700;color:var(--white)">${g.name}</div></a>`).join("")}
  </div>
  <div style="font-family:var(--fd);font-size:13px;font-weight:800;margin:0 0 10px">⚡ Earn Game Minutes</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">
    ${[{i:"💙",l:"Wellness check-in",m:15},{i:"🥦",l:"Hit nutrition targets",m:20},{i:"🍽️",l:"Cook a meal",m:15},{i:"📅",l:"Plan full week",m:60},{i:"🏆",l:"Win a challenge",m:45},{i:"⭐",l:"Level up XP",m:30}].map(e=>`<div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:9px"><div style="font-size:18px">${e.i}</div><div style="flex:1;font-size:10px;font-weight:600">${e.l}</div><div style="font-size:12px;font-weight:800;color:var(--yellow)">+${e.m}m</div></div>`).join("")}
  </div>
  <div style="font-family:var(--fd);font-size:13px;font-weight:800;margin-bottom:10px">🎯 Mini Games</div>
  <div style="display:flex;gap:7px;margin-bottom:11px">

// ── Actions ────────────────────────────────────────────────
function setTab(t){UI.tab=t;render();}
function render(){if(!document.getElementById("topbar"))return;renderTopBar();renderHeader();renderNav();renderMain();}
function setDay(d){UI.selDay=d;renderMain();}
function setDiet(d){saveFamilyDoc({activeDiet:d});renderMain();}

async function addXP(n) {
  const newXP = Math.max(0,(userDoc?.xp||0)+n);
  const newMins = Math.max(0,(userDoc?.gameBankMins||0)+(n>0?Math.round(n/10):0));
  await saveUserDoc({xp:newXP,gameBankMins:newMins});
}

async function saveWeekSnapshot() {
  const ws=calcWeekScore();
  const hist=[...(currentFamily?.weekHistory||[]),{date:new Date().toLocaleDateString(),meals:ws.meals,nutrition:ws.nutrition,cost:totalCost(),cooked:ws.cooked,total:ws.total}];
  const defaultPlan={};
  DAYS.forEach(d=>{defaultPlan[d]={Breakfast:null,Lunch:null,Dinner:null,Snack:null};});
  await saveFamilyDoc({weekHistory:hist,weekPlan:defaultPlan});
  await saveUserDoc({cookedMeals:{},checkedSteps:{}});
  await addXP(100);
  showToast(`📸 Week saved! Score: ${ws.total} · +100 XP`, "success");
  for(const _wm of(currentFamily?.members||[])){const _wi=await checkAvatarUnlocks(_wm,"week_complete");if(_wi){showUnlockCelebration(_wi,_wm.name);break;}}
  renderMain();
}

function openAdd(day,type){UI.showAdd={day,type};renderAddModal();}
function closeAdd(){UI.showAdd=null;const el=document.getElementById("add-modal");if(el)el.remove();}

async function addMealToSlot(day,type,meal) {
  const plan = {...(currentFamily?.weekPlan||{})};
  if(!plan[day]) plan[day]={Breakfast:null,Lunch:null,Dinner:null,Snack:null};
  plan[day][type]=meal;
  await saveFamilyDoc({weekPlan:plan});
  await addXP(10);
  closeAdd();
  renderMain();
}

async function removeMeal(day,type) {
  const plan = {...(currentFamily?.weekPlan||{})};
  if(plan[day]) plan[day][type]=null;
  await saveFamilyDoc({weekPlan:plan});
  renderMain();
}

async function removeFromWeek(meal) {
  const plan = {...(currentFamily?.weekPlan||{})};
  DAYS.forEach(d=>{if(plan[d])MT.forEach(t=>{if(plan[d][t]===meal)plan[d][t]=null;});});
  await saveFamilyDoc({weekPlan:plan});
  renderMain();
}

async function toggleCard(meal) {
  const col={...(currentFamily?.collapsedMeals||{})};
  col[meal]=!col[meal];
  await saveFamilyDoc({collapsedMeals:col});
  const el=document.getElementById("mc-"+meal.replace(/\s/g,"_"));
  if(el) el.outerHTML=renderMC(meal); else renderMain();
}

async function toggleAllCollapse() {
  const newState=!currentFamily?.allCollapsed;
  const col={};
  uniqueMeals().forEach(m=>col[m]=newState);
  await saveFamilyDoc({allCollapsed:newState,collapsedMeals:col});
  renderMain();
}

async function checkStep(meal,idx) {
  const steps={...(userDoc?.checkedSteps||{})};
  if(!steps[meal]) steps[meal]=new Array(allMeals()[meal]?.steps.length||0).fill(false);
  steps[meal][idx]=!steps[meal][idx];
  await saveUserDoc({checkedSteps:steps});
  await addXP(steps[meal][idx]?5:-5);
  const el=document.getElementById("mc-"+meal.replace(/\s/g,"_"));
  if(el) el.outerHTML=renderMC(meal);
}

async function markCooked(meal) {
  const cooked={...(userDoc?.cookedMeals||{})};
  cooked[meal]=true;
  await saveUserDoc({cookedMeals:cooked,gameBankMins:(userDoc?.gameBankMins||0)+15});
  await addXP(50);
  showToast("🎉 Meal cooked! +50 XP +15 game minutes", "success");
  const _ckMem=(currentFamily?.members||[])[0];if(_ckMem){const _ckItem=await checkAvatarUnlocks(_ckMem,"cook_meal");if(_ckItem)showUnlockCelebration(_ckItem,_ckMem.name);}
  const el=document.getElementById("mc-"+meal.replace(/\s/g,"_"));
  if(el) el.outerHTML=renderMC(meal);
}

async function quickSnack(day,snack) {
  if(allMeals()[snack]){
    const plan={...(currentFamily?.weekPlan||{})};
    if(!plan[day]) plan[day]={Breakfast:null,Lunch:null,Dinner:null,Snack:null};
    plan[day]["Snack"]=snack;
    await saveFamilyDoc({weekPlan:plan});
    renderMain();
  }
}

// Challenge actions
async function issueChallenge(){
  const chals=(currentFamily?.challenges||[]);
  if(chals.filter(c=>c.status==="active").length>=3){showToast("Max 3 active challenges!","warn");return;}
  const desc=document.getElementById("ch-desc")?.value||"challenge";
  const type=document.getElementById("ch-type")?.value||"custom";
  const days=parseInt(document.getElementById("ch-days")?.value||"7");
  const ch={id:"ch-"+Date.now(),type,desc,target:5,days,daysLeft:days,status:"active",issuedBy:currentUser.displayName||"You",myProgress:0,created:Date.now()};
  await saveFamilyDoc({challenges:[...chals,ch]});
  UI.showChallengeForm=false;

async function addMember(){const newM={id:"m-"+Date.now(),name:"New Member",age:25,emoji:"🧑",color:["#69C9D0","#EE1D52","#facc15","#4ade80","#a78bfa","#fb923c"][Math.floor(Math.random()*6)],diet:"Standard",goalType:"maintain",goal:"Maintain healthy weight",picky:false,avoid:[],loves:[],moods:[],games:[]};const members=[...(currentFamily?.members||[]),newM];await saveFamilyDoc({members,size:(currentFamily?.size||1)+1});UI.showMemEdit=newM.id;renderMain();renderMemModal();}
function renderMemModal(){
  const m=(currentFamily?.members||[]).find(f=>String(f.id)===String(UI.showMemEdit));if(!m)return;

    <div class="fg"><label class="fl">DIET TYPE</label><select class="fsel" id="em-diet">${Object.keys(DIET_T).map(d=>`<option value="${d}" ${(m.diet||"Standard")===d?"selected":""}>${d}</option>`).join("")}</select></div>
    <div class="fg"><label class="fl">HEALTH GOAL</label><select class="fsel" id="em-goal">${[["maintain","Maintain healthy weight"],["muscle","Build muscle"],["lose","Lose weight"],["grow","Growing (child)"],["energy","Boost energy"]].map(([v,l])=>`<option value="${v}" ${(m.goalType||"maintain")===v?"selected":""}>${l}</option>`).join("")}</select></div>
    <div class="fg"><label class="fl">FAVORITE FOODS (comma separated)</label><input class="fi2" id="em-loves" value="${(m.loves||[]).join(", ")}"/></div>

    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;margin-bottom:8px"><span style="font-size:11px">🙈 Picky Eater</span><button id="em-picky" onclick="this.classList.toggle('on');this.classList.toggle('off')" class="tsw ${m.picky?"on":"off"}"></button></div>
    <div style="display:flex;gap:6px"><button onclick="saveMemProfile()" class="btn btnp" style="flex:1;padding:8px">Save</button><button onclick="closeMemModal()" class="close-btn" style="width:auto;padding:8px 12px">Cancel</button></div>

async function saveMemProfile(){
  const picky=document.getElementById("em-picky")?.classList.contains("on");
  const members=(currentFamily?.members||[]).map(m=>String(m.id)===String(UI.showMemEdit)?{...m,name:document.getElementById("em-name")?.value||m.name,age:+document.getElementById("em-age")?.value||m.age,emoji:document.getElementById("em-emoji")?.value||m.emoji,diet:document.getElementById("em-diet")?.value||m.diet,goalType:document.getElementById("em-goal")?.value||m.goalType,goal:document.getElementById("em-goal")?.options[document.getElementById("em-goal")?.selectedIndex]?.text||m.goal,loves:(document.getElementById("em-loves")?.value||"").split(",").map(s=>s.trim()).filter(Boolean),avoid:(document.getElementById("em-avoid")?.value||"").split(",").map(s=>s.trim()).filter(Boolean),picky}:m);

// Game actions
async function startTimer(mins){
  if((userDoc?.gameBankMins||0)<mins){showToast("Not enough game minutes! Keep hitting your goals.","warn");return;}
  await saveUserDoc({gameBankMins:(userDoc?.gameBankMins||0)-mins});
  UI.timerSecs=mins*60;UI.timerTotal=mins*60;UI.timerActive=true;renderMain();
  UI.timerInterval=setInterval(()=>{
    UI.timerSecs--;
    if(UI.timerSecs<=0){clearInterval(UI.timerInterval);UI.timerActive=false;renderMain();showToast("⏰ Break's up! Great job 💙","info");}
    else{
      const el=document.querySelector("[data-timer]");if(el)el.textContent=`${String(Math.floor(UI.timerSecs/60)).padStart(2,"0")}:${String(UI.timerSecs%60).padStart(2,"0")}`;
    }
  },1000);
}
function stopTimer(){if(UI.timerInterval)clearInterval(UI.timerInterval);UI.timerActive=false;UI.timerSecs=0;renderMain();}

function initTrivia(){UI.triviaIdx=0;UI.triviaAns=null;UI.triviaScore=0;}
function answerTrivia(ans){if(UI.triviaAns!==null)return;UI.triviaAns=ans;const q=TRIVIA_Q[UI.triviaIdx%TRIVIA_Q.length];if(ans===q.ans){UI.triviaScore++;addXP(10);}renderMain();}
function nextTrivia(){UI.triviaIdx++;UI.triviaAns=null;if(UI.triviaIdx%TRIVIA_Q.length===0){showToast(`🎉 Round done! Score: ${UI.triviaScore}/${TRIVIA_Q.length}`,UI.triviaScore>=4?"success":"info");UI.triviaScore=0;}renderMain();}

function initMatch(){
  const pairs=Object.entries(MEALS).slice(0,4).map(([name,d])=>[{id:name+"-name",show:name.substring(0,8),match:name},{id:name+"-em",show:d.emoji,match:name}]).flat();
  UI.matchCards=pairs.sort(()=>Math.random()-.5);UI.matchFlipped=[];UI.matchMatched=[];UI.matchScore=0;
}
function flipCard(i){
  if(UI.matchMatched.includes(i)||UI.matchFlipped.includes(i))return;
  if(UI.matchFlipped.length===1){
    const first=UI.matchFlipped[0];
    if(UI.matchCards[first].match===UI.matchCards[i].match){UI.matchMatched.push(first,i);UI.matchFlipped=[];UI.matchScore++;if(UI.matchScore>=4){saveUserDoc({gameBankMins:(userDoc?.gameBankMins||0)+10});showToast("🎉 +10 game minutes!","success");}}
    else{UI.matchFlipped.push(i);renderMain();setTimeout(()=>{UI.matchFlipped=[];renderMain();},900);return;}
  }else{UI.matchFlipped=[i];}renderMain();
}

// AI calls
function buildCtx(){
  const pk=(currentFamily?.members||[]).filter(m=>m.picky).map(m=>`${m.name}(avoids:${(m.avoid||[]).join(",")||"nothing"},loves:${(m.loves||[]).join(",")||"everything"})`).join(";");
  const diets=[...new Set((currentFamily?.members||[]).map(m=>m.diet))].join(",");
  const alerts=getNutrAlerts(UI.selDay);
  return `Family:${currentFamily?.name},size:${currentFamily?.size||1}.Members:${(currentFamily?.members||[]).map(m=>`${m.name}(age:${m.age||"?"},diet:${m.diet||"Standard"},picky:${m.picky})`).join(";")}.Diets:${diets||"Standard"}.Picky:${pk||"none"}.Alerts:${alerts.map(a=>a.group).join(",")||"none"}.Meals:${uniqueMeals().join(",")||"none"}.`;
}

async function callAI(messages, system) {
  try {
    const res = await fetch("/.netlify/functions/ai", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages,system,max_tokens:1000}),
    });
    if (!res.ok) {
      const err = await res.json();
      return err.error || "AI error. Please try again.";
    }
    const data = await res.json();
    return data.content?.[0]?.text || "Something went wrong!";
  } catch(e) {
    console.error("AI call error:", e);
    return "Connection error. Check your internet.";
  }
}

async function sendAI(){
  if(!UI.aiInput.trim()||UI.aiLoading)return;
  const msg=UI.aiInput.trim();UI.aiInput="";UI.aiChat.push({role:"user",text:msg});UI.aiLoading=true;renderMain();bindAI();
  const reply=await callAI(UI.aiChat.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text})),`You are NeuroMeal AI — warm, concise, AuDHD-friendly. Max 5 sentences. Use emojis. Bold meal names. ${buildCtx()}`);
  UI.aiChat.push({role:"assistant",text:reply});UI.aiLoading=false;renderMain();bindAI();
}

async function getWESugs(){
  if(UI.aiLoading)return;
  const sel=(currentFamily?.members||[]).filter(m=>UI.weSelected.includes(m.id));
  const allAvoid=[...new Set(sel.flatMap(m=>m.avoid||[]))];
  UI.aiLoading=true;UI.weSugs=null;renderMain();
  const prompt=`Suggest 3 meals as ONE shared dish for: ${sel.map(m=>`${m.name}(${m.diet||"Standard"},loves:${(m.loves||[]).join(",")},avoids:${(m.avoid||[]).join(",")||"nothing"},picky:${m.picky})`).join(";")}.MUST avoid:${allAvoid.join(",") || "nothing"}.Respond ONLY with JSON array no markdown:[{"name":"Name","emoji":"🍽️","desc":"one line","whyWorks":["Person ✅ reason"],"veggieHack":"tip"}]`;
  const raw=await callAI([{role:"user",content:prompt}],"Return only valid JSON array. No markdown. No backticks.");
  try{const clean=raw.replace(/```json|```/g,"").trim();UI.weSugs=JSON.parse(clean);}
  catch(e){UI.weSugs=[{name:"AI Suggestion",emoji:"🍽️",desc:raw.substring(0,120),whyWorks:[],veggieHack:""}];}
  UI.aiLoading=false;renderMain();
}

async function getAITip(){
  const inp=document.getElementById("tips-ai-in");if(!inp?.value.trim())return;
  const q=inp.value;const res=document.getElementById("ai-tip-res");
  res.innerHTML=`<div style="color:var(--gray);font-size:10px">⏳ Thinking...</div>`;
  const reply=await callAI([{role:"user",content:q}],`Veggie sneaking expert for picky eaters. Context: ${buildCtx()} Give 3 practical tips. Brief and friendly.`);
  res.innerHTML=`<div style="background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.16);border-radius:9px;padding:11px;font-size:11px;line-height:1.55">${reply.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>")}</div>`;
  inp.value="";
}

// ── Wardrobe functions already defined in AVATAR_CONSTANTS above
// Init — modules run deferred so DOM is ready, but guard anyway
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", () => { initTrivia(); initMatch(); });
} else {

  initMatch();
}

.ps+.ps{border-left:1px solid var(--border);}
.psl{font-size:7px;color:var(--gray);font-weight:700;letter-spacing:.7px;margin-bottom:2px;}
.psv{font-family:var(--fd);font-size:15px;font-weight:800;}
.vtips{margin:0 13px 12px;background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.16);border-radius:10px;padding:11px 13px;}
.vtips-t{font-size:8px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:7px;}
.vtip{font-size:11px;line-height:1.4;margin-bottom:4px;padding-left:14px;position:relative;}
.vtip::before{content:"🥦";position:absolute;left:0;font-size:8px;top:2px;}
.steps{padding:0 13px 12px;}
.step{display:flex;gap:7px;padding:6px 8px;border-radius:7px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;transition:all .2s;}
.step.done{background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.16);}
.step:hover:not(.done){background:var(--card2);}
.sck{width:18px;height:18px;border-radius:5px;border:2px solid var(--gray2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s;}
.sck.chk{background:var(--green);border-color:var(--green);}
.stxt{font-size:11px;line-height:1.4;}
.stxt.done{color:var(--gray);text-decoration:line-through;}
.grow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.grow:last-child{border-bottom:none;}
.alertcard{background:rgba(238,29,82,.06);border:1px solid rgba(238,29,82,.18);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;gap:9px;}
.tag{display:inline-block;padding:1px 6px;border-radius:6px;font-size:8px;font-weight:700;}
.te{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2);}
.tm{background:rgba(250,204,21,.1);color:var(--yellow);border:1px solid rgba(250,204,21,.2);}
.th{background:rgba(238,29,82,.1);color:var(--pink);border:1px solid rgba(238,29,82,.2);}
.tck{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2);}
.tli{display:flex;align-items:center;gap:11px;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
.tld{width:8px;height:8px;border-radius:50%;background:var(--cyan);flex-shrink:0;}
.tld.ck{background:var(--green);}
.achg{display:flex;gap:12px;flex-wrap:wrap;}
.ach{display:flex;flex-direction:column;align-items:center;gap:3px;}
.achic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.achic.on{background:linear-gradient(135deg,rgba(105,201,208,.13),rgba(238,29,82,.08));border:2px solid rgba(105,201,208,.28);}
.achic.off{background:var(--border);border:2px solid var(--border);filter:grayscale(1);opacity:.22;}
.achl{font-size:7px;font-weight:700;letter-spacing:.4px;text-align:center;}
.achl.on{color:var(--cyan);}.achl.off{color:var(--gray);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:17px;padding:19px;width:370px;max-width:94vw;max-height:88vh;overflow-y:auto;animation:popIn .2s ease;}
.modal-t{font-family:var(--fd);font-size:15px;font-weight:800;margin-bottom:2px;}
.modal-s{font-size:10px;color:var(--gray);margin-bottom:13px;}
.fg{margin-bottom:10px;}
.fl{font-size:8px;font-weight:800;color:var(--gray);letter-spacing:.8px;margin-bottom:3px;display:block;}
.fi2{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--white);font-size:12px;font-family:var(--fb);outline:none;transition:border-color .2s;}
.fi2:focus{border-color:var(--cyan);}
.fsel{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--white);font-size:12px;font-family:var(--fb);outline:none;cursor:pointer;}
.tsw{width:32px;height:17px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;display:inline-block;}
.tsw.on{background:var(--cyan);}.tsw.off{background:var(--border);}
.tsw::after{content:'';position:absolute;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .18s;}
.tsw.on::after{left:17px;}.tsw.off::after{left:2px;}
.mopt{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg);border:1px solid var(--border);border-radius:9px;cursor:pointer;margin-bottom:5px;transition:all .2s;width:100%;text-align:left;font-family:var(--fb);}
.mopt:hover{border-color:var(--cyan);}
.close-btn{width:100%;padding:8px;background:var(--border);border:none;border-radius:8px;color:var(--gray);font-weight:700;cursor:pointer;font-family:var(--fb);margin-top:5px;}
input::placeholder,textarea::placeholder{color:var(--gray);}
input,textarea,select{color:var(--white);}
@media(max-width:680px){
  .sgrid{grid-template-columns:repeat(2,1fr);}
  .trend-strip{grid-template-columns:1fr 1fr;}
  .cgrid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
    <div style="text-align:center">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--pink));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;animation:glow 2s ease infinite">🧠</div>
      <div style="font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:-.5px">NeuroMeal</div>
      <div style="font-size:11px;color:var(--gray);margin-top:6px">Loading...</div>
    </div>
  </div>
</div>
</body>
</html>
