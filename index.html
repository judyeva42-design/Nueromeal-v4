function signInWithGoogle() {
  // Navigate to dedicated sign-in page
  window.location.href = '/signin.html';
}

async function handleSignOut() {
  try {
    unsubscribeAll();
    await signOut(auth);
    currentUser = null; userDoc = null; currentFamily = null; familyId = null;
    renderApp();
  } catch(e) {
    console.error("Sign out error:", e);
    renderApp();
  }
}

// Handle auth state changes
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = {
      uid: user.uid,
      displayName: user.displayName || "User",
      email: user.email || "",
      photoURL: user.photoURL || "",
    };
    await initUserSession(currentUser);
  } else {
    // Check for redirect result first (returning from signin page)
    try {
      const result = await getRedirectResult(auth);
      if (result?.user) {
        currentUser = {
          uid: result.user.uid,
          displayName: result.user.displayName || "User",
          email: result.user.email || "",
          photoURL: result.user.photoURL || "",
        };
        await initUserSession(currentUser);
      } else {
        renderApp();
      }
    } catch(e) {
      console.error("Redirect result error:", e);
      renderApp();
    }
  }
});

// ── Helpers ────────────────────────────────────────────────
function F() { return currentFamily || {}; }
function allMeals() { return { ...MEALS, ...(F().customMeals||{}) }; }
function uniqueMeals() {
  const a = [];
  DAYS.forEach(d => MT.forEach(t => { if (F().weekPlan?.[d]?.[t]) a.push(F().weekPlan[d][t]); }));
  return [...new Set(a)];
}
function totalCost() { return uniqueMeals().reduce((s,m) => s + (allMeals()[m]?.cost||0), 0); }
function calcStart(mt,prep,cook) {
  const [h,m] = mt.split(":").map(Number);
  let sm = h*60+m-prep-cook; if(sm<0) sm+=1440;
  return `${String(Math.floor(sm/60)).padStart(2,"0")}:${String(sm%60).padStart(2,"0")}`;
}
function getDayNutr(day) {
  const t = {calories:0,protein:0,carbs:0,fat:0,fiber:0,fruits:0,vegetables:0,dairy:0,grains:0};
  MT.map(tp => F().weekPlan?.[day]?.[tp]).filter(Boolean).forEach(m => {
    const d = allMeals()[m]; if(!d) return;
    Object.keys(t).forEach(k => t[k] += (d[k]||0));
  });
  return t;
}
function getNutrAlerts(day) {
  const n=getDayNutr(day), tgt=DIET_T[F().activeDiet||"Standard"], a=[];
  if(n.fruits<tgt.fruits*.5) a.push({group:"Fruit",msg:`Only ${n.fruits} of ${tgt.fruits} fruit servings.`});
  if(n.vegetables<tgt.vegetables*.5) a.push({group:"Veggies",msg:`Only ${n.vegetables} of ${tgt.vegetables} veg servings.`});
  if(n.protein<tgt.protein*.5) a.push({group:"Protein",msg:`${n.protein}g of ${tgt.protein}g protein.`});
  return a;
}
function getNutrScore(day) {
  const n=getDayNutr(day), tgt=DIET_T[F().activeDiet||"Standard"];
  const keys=["protein","carbs","fat","fruits","vegetables"];
  return Math.round((keys.filter(k=>n[k]>=(tgt[k]||1)*.7).length/keys.length)*100);
}
function calcWeekScore() {
  const meals=Object.values(F().weekPlan||{}).flatMap(d=>Object.values(d)).filter(Boolean).length;
  const nutr=Math.round(DAYS.reduce((s,d)=>s+getNutrScore(d),0)/7);
  const ck=Object.values(userDoc?.cookedMeals||{}).filter(Boolean).length;
  const well=Object.values(userDoc?.wellnessLog||{}).filter(v=>v?.energy!==null&&v?.energy!==undefined).length;
  return {meals,nutrition:nutr,cooked:ck,wellness:well,total:meals*10+nutr+ck*20+well*15};
}

function buildAvatarEmoji(member) {
  const av = member.avatar || {};
  const toneObj = AV_TONES.find(t=>t.label===(av.tone||"Medium")) || AV_TONES[2];
  const baseEmoji = AV_BASE[member.avatarBase||"Woman"]?.emoji || "\u{1F469}";
  const baseWithTone = baseEmoji + toneObj.mod;
  const hairObj = AV_HAIR.find(h=>h.id===(av.hair||"straight"));
  const outfitObj = AV_OUTFITS.find(o=>o.id===(av.outfit||"casual"));
  const accObj = AV_ACCESSORIES.find(a=>a.id===(av.accessory||"none"));
  return {
    full: (accObj?.emoji||"") + (hairObj?.emoji||baseWithTone) + (outfitObj?.emoji||""),
    base: baseWithTone,
    acc: accObj?.emoji || "",
    hair: hairObj?.emoji || baseWithTone,
    outfit: outfitObj?.emoji || "",
  };
}
function renderAvatarBadge(member, size=32) {
  if (!member) return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.44)}px">\u{1F464}</div>`;
  const av = buildAvatarEmoji(member);
  const color = member.color || "#69C9D0";
  const r = Math.round(size*.35);
  return `<div style="width:${size}px;height:${size}px;border-radius:${r}px;background:${color}22;border:2px solid ${color}44;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;line-height:1" title="${member.name}"><span style="font-size:${Math.round(size*.2)}px">${av.acc}</span><span style="font-size:${Math.round(size*.38)}px">${av.base}</span><span style="font-size:${Math.round(size*.2)}px">${av.outfit}</span></div>`;
}

// ── Firebase Operations ────────────────────────────────────
async function saveUserDoc(data) {
  if (!currentUser) return;
  try {
    setSyncStatus("syncing");
    await setDoc(doc(db,"users",currentUser.uid), { ...data, updatedAt:serverTimestamp() }, { merge:true });
    userDoc = { ...userDoc, ...data };
    setSyncStatus("online");
  } catch(e) {
    console.error("Save user error:", e);
    setSyncStatus("error");
  }
}
async function saveFamilyDoc(data) {
  if (!familyId) return;
  try {
    setSyncStatus("syncing");
    await setDoc(doc(db,"families",familyId), { ...data, updatedAt:serverTimestamp() }, { merge:true });
    currentFamily = { ...currentFamily, ...data };
    setSyncStatus("online");
  } catch(e) {
    console.error("Save family error:", e);
    setSyncStatus("error");
  }
}
function subscribeToFamily(fid) {
  const unsub = onSnapshot(doc(db,"families",fid), (snap) => {
    if (snap.exists()) {
      currentFamily = { id:fid, ...snap.data() };
      setSyncStatus("online");
      renderMain();
      renderHeader();
    }
  }, (e) => { setSyncStatus("error"); });
  unsubscribers.push(unsub);
}
function subscribeToUser(uid) {
  const unsub = onSnapshot(doc(db,"users",uid), (snap) => {
    if (snap.exists()) { userDoc = snap.data(); renderHeader(); }
  });
  unsubscribers.push(unsub);
}
function unsubscribeAll() {
  unsubscribers.forEach(u => u());
  unsubscribers = [];
}

// ── User Session ───────────────────────────────────────────
async function initUserSession(user) {
  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  if (!userSnap.exists()) {
    userDoc = {
      uid: user.uid,
      name: user.displayName || "User",
      email: user.email,
      photo: user.photoURL || "",
      xp: 0,
      gameBankMins: 30,
      wellnessLog: {},
      weekHistory: {},
      cookedMeals: {},
      checkedSteps: {},
      familyIds: [],
      createdAt: serverTimestamp(),
    };
    await setDoc(userRef, userDoc);
  } else {
    userDoc = userSnap.data();
  }
  subscribeToUser(user.uid);
  if (userDoc.familyIds?.length > 0) {
    familyId = userDoc.familyIds[0];
    subscribeToFamily(familyId);
    const famSnap = await getDoc(doc(db,"families",familyId));
    if (famSnap.exists()) {
      currentFamily = { id:familyId, ...famSnap.data() };
    }
  }
  renderApp();
}

async function createFamily(name) {
  if (!currentUser) { showGetActiveModal(); return; }
  try {
    const inviteCode = genInviteCode();
    const defaultWeekPlan = {};
    DAYS.forEach(d => { defaultWeekPlan[d] = {Breakfast:null,Lunch:null,Dinner:null,Snack:null}; });
    const famData = {
      name: name || `${currentUser.displayName?.split(" ")[0]}'s Family`,
      createdBy: currentUser.uid,
      inviteCode,
      memberIds: [currentUser.uid],
      members: [{
        id: currentUser.uid,
        name: currentUser.displayName || "Parent",
        emoji: "👩",
        color: "#69C9D0",
        diet: "Standard",
        goalType: "maintain",
        picky: false,
        avoid: [],
        loves: [],
        moods: [],
        games: [],
        isAdmin: true,
      }],
      weekPlan: defaultWeekPlan,
      prefDays: {Mon:null,Tue:null,Wed:null,Thu:null,Fri:null,Sat:null,Sun:null},
      messages: [],
      videos: [],
      challenges: [],
      activeDiet: "Standard",
      size: 1,
      weekHistory: [],
      customMeals: {},
      createdAt: serverTimestamp(),
    };
    const famRef = await addDoc(collection(db,"families"), famData);

    await saveUserDoc({ familyIds: arrayUnion(familyId) });
    subscribeToFamily(familyId);
    renderApp();
    showToast(`Family created! Invite code: ${inviteCode}`, "success");
  } catch(e) {
    console.error("Create family error:", e);
    showToast("Error creating family.", "error");
  }
}

async function joinFamily(code) {
  if (!currentUser) { showGetActiveModal(); return; }
  try {
    const q = query(collection(db,"families"), where("inviteCode","==",code.toUpperCase()));
    const snap = await getDocs(q);
    if (snap.empty) { showToast("Invalid invite code.", "error"); return; }
    const famDoc = snap.docs[0];
    familyId = famDoc.id;
    const famData = famDoc.data();
    if (famData.memberIds?.includes(currentUser.uid)) {
      showToast("You're already in this family!", "warn");
      currentFamily = { id:familyId, ...famData };
      subscribeToFamily(familyId);
      renderApp();
      return;
    }
    const newMember = {
      id: currentUser.uid,
      name: currentUser.displayName || "Member",
      emoji: "🧑",
      color: "#a78bfa",
      diet: "Standard",
      goalType: "maintain",
      picky: false,
      avoid: [],
      loves: [],
      moods: [],
      games: [],
    };
    await updateDoc(doc(db,"families",familyId), {
      memberIds: arrayUnion(currentUser.uid),
      members: arrayUnion(newMember),
      size: (famData.size||1) + 1,
    });
    await saveUserDoc({ familyIds: arrayUnion(familyId) });
    currentFamily = { id:familyId, ...famData };
    subscribeToFamily(familyId);
    renderApp();
    showToast(`Joined ${famData.name}!`, "success");
  } catch(e) {
    showToast("Error joining family.", "error");
  }
}

async function createChallengeRoom(name) {

async function joinChallengeRoom(code) {
  if (!currentUser) { showGetActiveModal(); return; }
  try {
    const q = query(collection(db,"challengeRooms"), where("inviteCode","==",code.toUpperCase()));
    const snap = await getDocs(q);
    if (snap.empty) { showToast("Invalid room code.", "error"); return; }
    const roomDoc = snap.docs[0];

function exportData() {
  if (!currentUser) { showGetActiveModal(); return; }
  const data = {
    exportDate: new Date().toISOString(),
    user: { name:userDoc?.name, xp:userDoc?.xp, wellnessLog:userDoc?.wellnessLog, weekHistory:userDoc?.weekHistory },
    family: { name:currentFamily?.name, weekPlan:currentFamily?.weekPlan, members:currentFamily?.members, videos:currentFamily?.videos },
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `neuromeal-backup-${new Date().toLocaleDateString().replace(/\//g,"-")}.json`;
  a.click();
  showToast("Backup downloaded!", "success");
}

function bindOnboard() {
  const s = ONBOARD_STEPS[UI.onboardStep || 0];

  // Choice buttons
  const choicesEl = document.getElementById('ob-choices');
  if (choicesEl) {
    choicesEl.querySelectorAll('button[data-choice]').forEach(btn => {
      btn.addEventListener('click', function() {
        UI.onboardData[s.field] = this.getAttribute('data-choice');
        // Update styles
        choicesEl.querySelectorAll('button[data-choice]').forEach(b => {
          b.style.borderColor = 'var(--border)';
          b.style.background = 'transparent';
        });
        this.style.borderColor = 'var(--cyan)';
        this.style.background = 'rgba(105,201,208,.1)';
      });
    });
  }

  // Next button
  const nextBtn = document.getElementById('ob-next');
  if (nextBtn) {
    nextBtn.addEventListener('click', async function() {
      const step = UI.onboardStep || 0;
      const s = ONBOARD_STEPS[step];
      const isLast = step === ONBOARD_STEPS.length - 1;

      // Save text/number inputs
      const input = document.getElementById('ob-input');
      if (input && s.field) UI.onboardData[s.field] = input.value.trim();
      const h = document.getElementById('ob-height');
      const w = document.getElementById('ob-weight');
      if (h) UI.onboardData.height = h.value.trim();
      if (w) UI.onboardData.weight = w.value.trim();

      if (isLast) {
        // Save profile to Firestore
        const dietMap = {
          '🥗 Standard (I eat pretty much everything)':'Standard',
          '🥩 Keto (low carb, high fat)':'Keto',
          '🌿 Vegan (plant-based all the way)':'Vegan',
          '🐟 Vegetarian':'Vegetarian',
          '🫙 Mediterranean':'Mediterranean',
          '🚫🌾 Gluten-Free':'Gluten-Free',
          '🥛 Dairy-Free':'Dairy-Free',
          '🦴 Paleo':'Paleo',
          '💉 GLP-1 (Ozempic/Wegovy/Mounjaro)':'GLP-1',
        };
        const profile = {
          name: UI.onboardData.name || currentUser?.displayName || 'User',
          age: UI.onboardData.age || '',
          sex: UI.onboardData.sex || '',
          height: UI.onboardData.height || '',
          weight: UI.onboardData.weight || '',
          activity: UI.onboardData.activity || '',
          goal: UI.onboardData.goal || '',
          diet: dietMap[UI.onboardData.diet] || 'Standard',
          avoid: UI.onboardData.avoid || '',
          loves: UI.onboardData.loves || '',
          pickyEater: UI.onboardData.pickyEater || '',
          fridgeVibes: UI.onboardData.fridgeVibes || '',
        };
        await saveUserDoc({ profileComplete: true, profile, name: profile.name });
        addXP(50);
        showToast('Profile saved! +50 XP 🎉', 'success');
        setTimeout(() => window.location.reload(), 1000);
      } else {
        UI.onboardStep = step + 1;
        renderOnboard();
      }
    });
  }

  // Back button
  const backBtn = document.getElementById('ob-back');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      UI.onboardStep = Math.max(0, (UI.onboardStep || 0) - 1);
      renderOnboard();
    });
  }

  // Skip button
  const skipBtn = document.getElementById('ob-skip');
  if (skipBtn) {
    skipBtn.addEventListener('click', async function() {
      await saveUserDoc({ profileComplete: true, profile: {} });
      window.location.reload();
    });
  }
}


function bindFamilyMembers() {
  // Add member button
  const addBtn = document.getElementById('add-member-btn');
  if (addBtn) addBtn.addEventListener('click', function() {
    UI.showAddMember = true;
    renderMain();
  });

  // Cancel button
  const cancelBtn = document.getElementById('hm-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', function() {
    UI.showAddMember = false;
    renderMain();
  });

  // Save member button
  const saveBtn = document.getElementById('hm-save');
  if (saveBtn) saveBtn.addEventListener('click', async function() {
    const name = document.getElementById('hm-name')?.value?.trim();
    if (!name) { showToast('Please enter a name!', 'warn'); return; }
    const age = document.getElementById('hm-age')?.value?.trim();
    const diet = document.getElementById('hm-diet')?.value || 'Standard';
    const avoid = document.getElementById('hm-avoid')?.value?.trim();
    const pickyEater = document.getElementById('hm-picky')?.checked || false;
    const emojis = ['🧑','👦','👧','👨','👩','🧒','👴','👵','🧔','👱'];
    const emoji = emojis[Math.floor(Math.random() * emojis.length)];
    const newMember = { name, age, diet, avoid, pickyEater, emoji, addedAt: new Date().toISOString() };
    const hausMembers = [...(currentFamily?.hausMembers||[]), newMember];
    await saveFamilyDoc({ hausMembers });
    UI.showAddMember = false;
    showToast(`${name} added to your household! 🎉`, 'success');
    renderMain();
  });

  // Remove member buttons
  document.querySelectorAll('[data-remove-member]').forEach(btn => {
    btn.addEventListener('click', async function() {
      const idx = parseInt(this.getAttribute('data-remove-member'));
      const hausMembers = [...(currentFamily?.hausMembers||[])];
      const removed = hausMembers.splice(idx, 1)[0];
      await saveFamilyDoc({ hausMembers });
      showToast(`${removed.name} removed`, 'success');
      renderMain();
    });
  });
}

function ariaFix(group, msg) {
  const hausMembers = currentFamily?.hausMembers || [];
  const pickyOnes = hausMembers.filter(m=>m.pickyEater).map(m=>m.name);
  const pickyNote = pickyOnes.length > 0 ? ` Keep in mind ${pickyOnes.join(" and ")} are picky eaters.` : "";
  UI.ariaFixMsg = `I am low on ${group.toLowerCase()} today (${msg}). Give me 3 quick, practical and delicious ways to fix this before the day is over.${pickyNote}`;

  setTab("ai");

function renderMain() {
  if (!document.getElementById("mi")) return;
  const el = document.getElementById("mi");
  const map = {
    dashboard:renderDash, calendar:renderCal, meals:renderMeals,
    trends:renderTrends, nutrition:renderNutr, shopping:renderShop,
    compete:renderCompete, rooms:renderRooms, wellness:renderWellness,
    game:renderGame, family:renderFamily, ai:renderAI,
    chat:renderChat, videos:renderVideos, tips:renderTips,
  };
  el.innerHTML = (map[UI.tab]||renderDash)();
  if (UI.tab==="ai") bindAI();
  if (UI.tab==="chat") bindChat();
  if (UI.showAdd) renderAddModal();
  if (UI.showMemEdit!==null) renderMemModal();

  const loadDraftBtn = document.getElementById('load-draft-btn');
  if (loadDraftBtn) loadDraftBtn.addEventListener('click', loadDraftPlan);

  const pb = document.getElementById('profile-setup-btn');
  if (pb) pb.addEventListener('click', function() {
    UI.onboardStep = 0;
    UI.onboardData = {};
    renderOnboard();
  });
  // Attach onboard navigation if onboard is showing
  bindOnboard();
  // Attach family member buttons
  bindFamilyMembers();
  // Save recipe buttons in Aria
  document.querySelectorAll('[data-save-recipe]').forEach(btn => {
    btn.addEventListener('click', async function() {
      const idx = parseInt(this.getAttribute('data-save-recipe'));
      const text = decodeURIComponent(this.getAttribute('data-save-text')||'');
      const lines = text.split('\n').map(l=>l.replace(/[*#]/g,'').trim()).filter(Boolean);
      const name = lines.find(l=>l.length>3&&l.length<60&&!l.startsWith('-'))||'Aria Recipe';
      const hausSize = (currentFamily?.hausMembers||[]).length + 1;
      const recipe = { name, notes: text.substring(0,300), servings: hausSize, savedAt: new Date().toISOString() };
      const savedRecipes = [...(currentFamily?.savedRecipes||[]), recipe];
      await saveFamilyDoc({ savedRecipes });
      showToast(`🔖 "${name}" saved to your cookbook!`, 'success');
      renderMain();
    });
  });

  // Unsave recipe buttons
  document.querySelectorAll('[data-unsave]').forEach(btn => {
    btn.addEventListener('click', async function() {
      const idx = parseInt(this.getAttribute('data-unsave'));
      const savedRecipes = [...(currentFamily?.savedRecipes||[])];
      const removed = savedRecipes.splice(idx, 1)[0];
      await saveFamilyDoc({ savedRecipes });
      showToast(`"${removed.name}" removed`, 'success');
      renderMain();
    });
  });

  // Add saved recipe to calendar
  document.querySelectorAll('[data-add-saved]').forEach(btn => {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.getAttribute('data-add-saved'));
      const saved = currentFamily?.savedRecipes || [];
      UI.ariaAddMeal = saved[idx]?.name || '';
      UI.showAriaCalModal = true;
      const hausSize = (currentFamily?.hausMembers||[]).length + 1;
      UI.ariaServings = hausSize > 1 ? hausSize : 4;
      renderMain();
    });
  });

  // Attach trivia AI button
  const newTriviaBtn = document.getElementById('new-trivia-btn');
  if (newTriviaBtn) newTriviaBtn.addEventListener('click', generateAITrivia);
  const nextTriviaBtn = document.getElementById('next-trivia-btn');
  if (nextTriviaBtn) nextTriviaBtn.addEventListener('click', () => {
    UI.aiTrivia = null;
    UI.triviaAns = null;
    generateAITrivia();
  });
  // Spinner button
  const spinBtn = document.getElementById('spin-btn');
  if (spinBtn) spinBtn.addEventListener('click', spinWheel);
  // Memory reset button
  const memResetBtn = document.getElementById('mem-reset-btn');
  if (memResetBtn) memResetBtn.addEventListener('click', initMemory);
}

function parseWeeklyPlan(text) {
  const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const dayNames = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];
  const mealMap = {"breakfast":"Breakfast","lunch":"Lunch","dinner":"Dinner","snack":"Snack"};
  const plan = {};
  let currentDay = null;
  text.split("\n").map(l=>l.trim()).filter(Boolean).forEach(line => {
    const ll = line.toLowerCase().replace(/[*#🌅☀️🌙🍎]/g,"").trim();
    dayNames.forEach((d,i) => { if (ll.includes(d)) currentDay = days[i]; });
    if (currentDay) {
      Object.keys(mealMap).forEach(type => {
        if (ll.startsWith(type+":") || ll.includes(" "+type+":")) {
          const meal = line.split(":").slice(1).join(":").replace(/[*🌅☀️🌙🍎]/g,"").trim();
          if (meal && meal.length > 2 && meal.length < 60) {
            if (!plan[currentDay]) plan[currentDay] = {};
            plan[currentDay][mealMap[type]] = meal;
          }
        }
      });
    }
  });
  return plan;
}

async function initMemory() {
  UI.memLoading = true;
  UI.memFlipped = [];
  UI.memMatched = [];
  UI.memLocked = false;
  renderMain();

  const hausMembers = currentFamily?.hausMembers || [];
  const pickyOnes = hausMembers.filter(m=>m.pickyEater).map(m=>m.name);
  
  const prompt = `Generate 6 pairs of food emoji for a memory matching game.
${pickyOnes.length > 0 ? `Focus on foods that might help picky eaters: ${pickyOnes.join(", ")}` : "Use fun, colorful food emojis"}
Respond ONLY with JSON array of 6 unique emojis (no repeats): ["🥦","🍎","🧀","🥕","🍋","🥑"]`;

  try {
    const reply = await callAI([{role:"user",content:prompt}], "You are a game designer. Respond only with a valid JSON array of 6 food emojis.");
    const clean = reply.replace(/\`\`\`json|\`\`\`/g,"").trim();
    const emojis = JSON.parse(clean);
    if (Array.isArray(emojis) && emojis.length >= 6) {
      const items = emojis.slice(0,6).flatMap((emoji,i) => [
        {emoji, pair:String(i)},
        {emoji, pair:String(i)}
      ]);
      UI.memCards = items.sort(() => Math.random() - 0.5);
    } else throw new Error("Invalid");
  } catch(e) {
    const fallback = ["🥦","🍎","🧀","🥕","🍋","🥑"];
    const items = fallback.flatMap((emoji,i) => [{emoji,pair:String(i)},{emoji,pair:String(i)}]);
    UI.memCards = items.sort(() => Math.random() - 0.5);
  }
  UI.memLoading = false;
  renderMain();
}

function tapMemCard(idx) {
  if (!UI.memCards) return;
  if (UI.memLocked) return;
  if ((UI.memMatched||[]).includes(idx)) return;
  if ((UI.memFlipped||[]).includes(idx)) return;
  if ((UI.memFlipped||[]).length >= 2) return;
  UI.memFlipped = [...(UI.memFlipped||[]), idx];
  renderMain();
  if (UI.memFlipped.length === 2) {
    const [a, b] = UI.memFlipped;
    if (UI.memCards[a].pair === UI.memCards[b].pair) {
      UI.memMatched = [...(UI.memMatched||[]), a, b];
      UI.memFlipped = [];
      if (UI.memMatched.length === UI.memCards.length) { addXP(20); showToast("+20 XP! You matched everything! 🎉", "success"); }
      renderMain();
    } else {
      UI.memLocked = true;
      setTimeout(() => { UI.memFlipped = []; UI.memLocked = false; renderMain(); }, 900);
    }
  }
}

function getAriaGreeting() {
  const profile = userDoc?.profile || {};
  const hausMembers = currentFamily?.hausMembers || [];
  const firstName = profile.name ? profile.name.split(' ')[0] : null;
  const pickyOnes = hausMembers.filter(m => m.pickyEater).map(m => m.name);
  const memberNames = hausMembers.map(m => m.name);

  let greeting = `Hey${firstName ? ' ' + firstName : ''}! 👋 I'm Aria — your NeuroMeal AI.

`;

  if (memberNames.length > 0) {
    greeting += `I know you're cooking for ${memberNames.join(', ')}${pickyOnes.length > 0 ? ` — and I know ${pickyOnes.length === 1 ? pickyOnes[0] + ' can be' : pickyOnes.join(' and ') + ' can be'} picky 😄` : ''}.

function bindAI() {
  const el = document.getElementById("ai-msgs");
  if (el) el.scrollTop = el.scrollHeight;

  // Plan My Week button
  const planBtn = document.getElementById("aria-meal-plan-btn");
  if (planBtn) planBtn.addEventListener("click", generateWeeklyPlan);

  // Send button
  const sendBtn = document.getElementById("ai-send-btn");
  if (sendBtn) sendBtn.addEventListener("click", sendAIMsg);

  // Add to Calendar buttons on messages
  document.querySelectorAll("[data-aria-add]").forEach(btn => {
    btn.addEventListener("click", function() {
      const idx = parseInt(this.getAttribute("data-aria-add"));
      UI.ariaAddMeal = UI.aiChat[idx]?.text || decodeURIComponent(this.getAttribute("data-aria-text")||"");
      UI.showAriaCalModal = true;
      const hausSize = (currentFamily?.hausMembers||[]).length + 1;
      UI.ariaServings = hausSize > 1 ? hausSize : 4;
      renderMain();
    });
  });

  // Calendar modal buttons
  const cancelBtn = document.getElementById("aria-cal-cancel");
  if (cancelBtn) cancelBtn.addEventListener("click", () => { UI.showAriaCalModal = false; renderMain(); });

  // Day selector
  const dayBtns = document.getElementById("aria-day-btns");
  if (dayBtns) dayBtns.querySelectorAll("[data-day]").forEach(btn => {
    btn.addEventListener("click", function() {
      UI.ariaCalDay = this.getAttribute("data-day");
      renderMain();
    });
  });

  // Type selector
  const typeBtns = document.getElementById("aria-type-btns");
  if (typeBtns) typeBtns.querySelectorAll("[data-type]").forEach(btn => {
    btn.addEventListener("click", function() {
      UI.ariaCalType = this.getAttribute("data-type");
      renderMain();
    });
  });

  // Servings
  const srvMinus = document.getElementById("srv-minus");
  if (srvMinus) srvMinus.addEventListener("click", () => { UI.ariaServings = Math.max(1, (UI.ariaServings||4) - 1); renderMain(); });
  const srvPlus = document.getElementById("srv-plus");
  if (srvPlus) srvPlus.addEventListener("click", () => { UI.ariaServings = Math.min(20, (UI.ariaServings||4) + 1); renderMain(); });

  // Plan My Week button
  const planBtn = document.getElementById("aria-meal-plan-btn");
  if (planBtn) planBtn.addEventListener("click", generateWeeklyPlan);

  // Confirm add to calendar
  const confirmBtn = document.getElementById("aria-cal-confirm");
  if (confirmBtn) confirmBtn.addEventListener("click", async function() {
    const day = UI.ariaCalDay || "Mon";
    const type = UI.ariaCalType || "Dinner";
    const servings = UI.ariaServings || 4;
    // Extract meal name from Aria's response - take first line that looks like a meal
    const text = UI.ariaAddMeal || "";
    const lines = text.split("\n").map(l => l.replace(/[*#]/g,"").trim()).filter(Boolean);
    const mealName = lines.find(l => l.length > 3 && l.length < 60 && !l.startsWith("-") && !l.toLowerCase().startsWith("why") && !l.toLowerCase().startsWith("quick")) || "Aria Suggestion";
    
    const weekPlan = { ...(currentFamily?.weekPlan||{}) };
    if (!weekPlan[day]) weekPlan[day] = {};
    weekPlan[day][type] = mealName;
    await saveFamilyDoc({ weekPlan, ariaLastServings: servings });
    UI.showAriaCalModal = false;
    addXP(10);
    showToast(`✅ "${mealName}" added to ${day} ${type} for ${servings} people! +10 XP`, "success");
    renderMain();
  });
}

GUIDELINES:

- Flag if a suggestion contains ingredients anyone should avoid
- For picky eaters, suggest ways to modify meals or hide vegetables
- For GLP-1 users, prioritize high protein, smaller portions, low sugar
- Keep responses warm, concise, and actionable
- Use emojis sparingly but warmly
- When asked "Who's Eating?", suggest one meal that works for everyone`;

  const reply = await callAI(UI.aiChat.map(m=>({role:m.role,content:m.text})), systemPrompt);
  UI.aiLoading = false;
  UI.aiChat.push({role:"assistant",text:reply});
  renderMain();
}

async function callAI(messages, system="You are a helpful assistant.") {
  try {
    const response = await fetch("/api/ai", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({messages, system}),
    });
    const data = await response.json();
    return data.content?.[0]?.text || "Sorry, I couldn't respond right now.";
  } catch(e) {
    return "AI is taking a break. Try again in a moment!";
  }
}

async function addMeal(day, type, meal) {
  if (!currentUser) { showGetActiveModal(); return; }
  const weekPlan = { ...(F().weekPlan||{}) };
  if (!weekPlan[day]) weekPlan[day] = {};
  weekPlan[day][type] = meal;
  await saveFamilyDoc({ weekPlan });
  document.getElementById('add-modal')?.remove();
  UI.showAdd = null;
  renderMain();
  showToast(`✅ ${meal} added to ${day} ${type}!`, "success");
}

async function removeMeal(day, type) {
  if (!currentUser) { showGetActiveModal(); return; }
  const weekPlan = { ...(F().weekPlan||{}) };
  if (weekPlan[day]) weekPlan[day][type] = null;
  await saveFamilyDoc({ weekPlan });
  renderMain();
}

async function removeFromWeek(meal) {
  if (!currentUser) { showGetActiveModal(); return; }
  const weekPlan = { ...(F().weekPlan||{}) };
  DAYS.forEach(d => { MT.forEach(t => { if(weekPlan[d]?.[t]===meal) weekPlan[d][t]=null; }); });
  await saveFamilyDoc({ weekPlan });
  renderMain();
}

async function checkStep(meal, idx) {
  if (!currentUser) { showGetActiveModal(); return; }
  const steps = [...((userDoc?.checkedSteps||{})[meal]||new Array(allMeals()[meal]?.steps?.length||0).fill(false))];
  steps[idx] = !steps[idx];
  await saveUserDoc({ checkedSteps: { ...(userDoc?.checkedSteps||{}), [meal]: steps } });
  const allDone = steps.every(Boolean);
  if (allDone) { await addXP(30); showToast("+30 XP! All steps done!", "success"); }
  renderMain();
}

async function markCooked(meal) {
  if (!currentUser) { showGetActiveModal(); return; }
  await saveUserDoc({ cookedMeals: { ...(userDoc?.cookedMeals||{}), [meal]: true } });
  const gameMins = (userDoc?.gameBankMins||0) + 10;
  await saveUserDoc({ gameBankMins: gameMins });
  await addXP(50);
  showToast("+50 XP + 10 game mins! Meal cooked!", "success");
  renderMain();
}

function initMatch() {
  const items = [
    {emoji:"🥦",pair:"broccoli"},{emoji:"🥦",pair:"broccoli"},
    {emoji:"🍎",pair:"apple"},{emoji:"🍎",pair:"apple"},
    {emoji:"🧀",pair:"cheese"},{emoji:"🧀",pair:"cheese"},
    {emoji:"🥕",pair:"carrot"},{emoji:"🥕",pair:"carrot"},
  ];
  UI.matchCards = items.sort(() => Math.random() - 0.5);
  UI.matchFlipped = [];
  UI.matchMatched = [];
  UI.matchScore = 0;
}

function flipCard(idx) {
  if (UI.matchMatched.includes(idx) || UI.matchFlipped.includes(idx)) return;
  if (UI.matchFlipped.length >= 2) { UI.matchFlipped = []; renderMain(); return; }
  UI.matchFlipped = [...UI.matchFlipped, idx];
  renderMain();
  if (UI.matchFlipped.length === 2) {
    const [a,b] = UI.matchFlipped;
    if (UI.matchCards[a].pair === UI.matchCards[b].pair) {
      UI.matchMatched = [...UI.matchMatched, a, b];
      UI.matchFlipped = [];
      UI.matchScore++;
      if (UI.matchMatched.length === UI.matchCards.length) { addXP(20); showToast("+20 XP! All matched! 🎉", "success"); }
      renderMain();
    } else {
      setTimeout(() => { UI.matchFlipped = []; renderMain(); }, 900);
    }
  }
}

  await saveUserDoc({ wellnessLog });
  await addXP(15);
  showToast("+15 XP! Wellness logged!", "success");
}

async function saveWeekSnapshot() {
  if (!currentUser) { showGetActiveModal(); return; }
  const ws = calcWeekScore();
  const snapshot = {
    date: new Date().toISOString(),
    meals: ws.meals,
    nutrition: ws.nutrition,
    cooked: ws.cooked,
    cost: totalCost(),
    wellness: ws.wellness,
    total: ws.total,
  };
  const weekHistory = [...(currentFamily?.weekHistory||[]), snapshot].slice(-12);
  await saveFamilyDoc({ weekHistory, weekPlan: Object.fromEntries(DAYS.map(d=>[d,{Breakfast:null,Lunch:null,Dinner:null,Snack:null}])) });
  await addXP(100);
  showToast("+100 XP! Week closed out!", "success");
  renderMain();
}

.prep{display:flex;gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ps{flex:1;padding:10px;text-align:center;border-right:1px solid var(--border)}
.ps:last-child{border-right:none}
.psl{font-size:8px;color:var(--gray);font-weight:800;letter-spacing:.5px;margin-bottom:3px}
.psv{font-size:13px;font-weight:800}
.vtips{background:rgba(74,222,128,.04);border-top:1px solid rgba(74,222,128,.15);padding:12px 14px}
.vtips-t{font-size:9px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:7px}
.vtip{font-size:11px;color:var(--gray);margin-bottom:4px;padding-left:8px}
.steps{padding:12px 14px}
.step{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);cursor:pointer}
.step:last-child{border-bottom:none}
.sck{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sck.chk{background:var(--green);border-color:var(--green)}
.stxt{font-size:13px;line-height:1.5;flex:1}
.stxt.done{opacity:.5;text-decoration:line-through}
.pb{margin-bottom:8px}
.pbt{display:flex;justify-content:space-between;margin-bottom:4px}
.pbl{font-size:11px;font-weight:700}
.pbv{font-size:10px;color:var(--gray)}
.pbtr{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pbfl{height:100%;border-radius:3px;transition:width .5s ease}
.grow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2)}
.alertcard{display:flex;gap:10px;padding:12px 14px;background:rgba(238,29,82,.06);border:1px solid rgba(238,29,82,.2);border-radius:14px;margin-bottom:10px}
.tli{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.tli:last-child{border-bottom:none}
.tld{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.tld.ck{background:var(--green);border-color:var(--green)}
.achg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ach{text-align:center}
.achic{font-size:24px;margin-bottom:4px;filter:grayscale(1);opacity:.4;transition:all .3s}
.achic.on{filter:none;opacity:1}
.achl{font-size:9px;font-weight:800;color:var(--gray);letter-spacing:.3px}
.achl.on{color:var(--white)}
.btn{padding:10px 16px;border-radius:12px;border:none;cursor:pointer;font-size:12px;font-weight:800;font-family:var(--fb);transition:opacity .2s}
.btnp{background:linear-gradient(135deg,var(--cyan),var(--pink));color:#000}
.btng{background:var(--card2);border:1px solid var(--border);color:var(--white)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(105,201,208,.6))}50%{filter:drop-shadow(0 0 20px rgba(238,29,82,.6))}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(105,201,208,.4)}50%{box-shadow:0 0 0 8px rgba(105,201,208,0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</body>
</html>
