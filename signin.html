<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>NeuroMeal — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#f0f0ff;font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:380px;width:100%;text-align:center}
.brain{font-size:64px;margin-bottom:16px;animation:glow 3s ease infinite;display:block}
.title{font-family:"Syne",sans-serif;font-size:36px;font-weight:900;letter-spacing:-2px;margin-bottom:6px;background:linear-gradient(135deg,#69C9D0,#EE1D52);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:13px;color:#6b6b8a;margin-bottom:36px;line-height:1.6}
.card{background:#141420;border:1px solid #2a2a3e;border-radius:24px;padding:28px}
.desc{font-size:14px;color:#6b6b8a;margin-bottom:24px;line-height:1.7}
.btn-google{width:100%;padding:16px;background:#fff;border:none;border-radius:14px;cursor:pointer;font-size:15px;font-weight:800;font-family:"DM Sans",sans-serif;color:#000;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;transition:opacity .2s}
.btn-google:active{opacity:.8}
.btn-guest{width:100%;padding:12px;background:transparent;border:1px solid #2a2a3e;border-radius:14px;cursor:pointer;font-size:13px;font-weight:700;font-family:"DM Sans",sans-serif;color:#6b6b8a;transition:opacity .2s}
.btn-guest:active{opacity:.8}
.status{margin-top:16px;font-size:12px;color:#6b6b8a;min-height:20px}
.error{color:#EE1D52}
.loading{color:#69C9D0}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(105,201,208,.6))}50%{filter:drop-shadow(0 0 20px rgba(238,29,82,.6))}}
</style>
</head>
<body>
<div class="container">
  <span class="brain">🧠</span>
  <div class="title">NeuroMeal</div>
  <div class="sub">Smart meal planning for AuDHD families</div>
  <div class="card">
    <div class="desc">Sign in to save your meals, sync across devices, and unlock all features!</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
    <button class="btn-guest" onclick="browseAsGuest()">Browse without signing in</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDpERr9gjGnHQcAB6LJqtt2_v2mFOk6KQ",
  authDomain: "nueromeal.firebaseapp.com",
  projectId: "nueromeal",
  storageBucket: "nueromeal.firebasestorage.app",
  messagingSenderId: "312886497937",
  appId: "1:312886497937:web:12a21ed078f7b6260ce530",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

function setStatus(msg, type="") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status " + type;
}

// Check if returning from redirect
setStatus("Checking sign-in status...", "loading");
getRedirectResult(auth).then((result) => {
  if (result?.user) {
    setStatus("Signed in! Redirecting...", "loading");
    setTimeout(() => { window.location.href = '/'; }, 500);
  } else {
    setStatus("");
  }
}).catch((e) => {
  console.error(e);
  setStatus("");
});

// Also listen for auth state
onAuthStateChanged(auth, (user) => {
  if (user) {
    setStatus("Signed in! Redirecting...", "loading");
    setTimeout(() => { window.location.href = '/'; }, 500);
  }
});

window.signInGoogle = async function() {
  try {
    setStatus("Redirecting to Google...", "loading");
    await signInWithRedirect(auth, provider);
  } catch(e) {
    console.error(e);
    setStatus("Sign-in failed. Please try again.", "error");
  }
};

window.browseAsGuest = function() {
  window.location.href = '/';
};
</script>
</body>
</html>
